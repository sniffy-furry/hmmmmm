name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install dependencies (glm, spdlog)
      run: |
        sudo apt-get update
        sudo apt-get install -y libglm-dev libspdlog-dev

    - name: Create CMake module files
      run: |
        mkdir -p /home/runner/cppdeps/cmake/Modules

        # FindGLM.cmake
        cat > /home/runner/cppdeps/cmake/Modules/FindGLM.cmake <<'EOF'
        find_path(GLM_INCLUDE_DIR NAMES glm/glm.hpp PATHS /usr/include /usr/local/include)
        mark_as_advanced(GLM_INCLUDE_DIR)
        include(FindPackageHandleStandardArgs)
        find_package_handle_standard_args(GLM DEFAULT_MSG GLM_INCLUDE_DIR)
        if(GLM_FOUND AND NOT TARGET glm::glm)
            add_library(glm::glm INTERFACE IMPORTED)
            set_target_properties(glm::glm PROPERTIES INTERFACE_INCLUDE_DIRECTORIES "${GLM_INCLUDE_DIR}")
        endif()
        EOF

        # Findspdlog.cmake
        cat > /home/runner/cppdeps/cmake/Modules/Findspdlog.cmake <<'EOF'
        find_path(spdlog_INCLUDE_DIR NAMES spdlog/spdlog.h PATHS /usr/include /usr/local/include)
        find_library(spdlog_LIBRARY NAMES spdlog PATHS /usr/lib /usr/lib/x86_64-linux-gnu)
        mark_as_advanced(spdlog_INCLUDE_DIR spdlog_LIBRARY)
        include(FindPackageHandleStandardArgs)
        find_package_handle_standard_args(spdlog DEFAULT_MSG spdlog_INCLUDE_DIR spdlog_LIBRARY)
        if(spdlog_FOUND AND NOT TARGET spdlog::spdlog)
            add_library(spdlog::spdlog UNKNOWN IMPORTED)
            set_target_properties(spdlog::spdlog PROPERTIES
                INTERFACE_INCLUDE_DIRECTORIES "${spdlog_INCLUDE_DIR}"
                IMPORTED_LOCATION "${spdlog_LIBRARY}"
            )
        endif()
        EOF

    - name: Install CMake 3.25.1
      run: |
        wget -qO- "https://github.com/Kitware/CMake/releases/download/v3.25.1/cmake-3.25.1-linux-x86_64.tar.gz" | sudo tar --strip-components=1 -xz -C /usr/local
        cmake --version
        echo "/usr/local/bin" >> $GITHUB_PATH

    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
