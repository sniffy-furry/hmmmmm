name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK and NDK
      uses: android-actions/setup-android@v3
      with:
        packages: |
          platform-tools
          platforms;android-26
          build-tools;33.0.2
          ndk;26.1.10909125

    - name: Cache vcpkg
      uses: actions/cache@v3
      with:
        path: /home/runner/work/vcpkg
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Install vcpkg and dependencies
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        ./bootstrap-vcpkg.sh
        echo "VCPKG_ROOT=$PWD" >> $GITHUB_ENV
        echo "$PWD" >> $GITHUB_PATH
        ./vcpkg install glm spdlog --triplet arm64-android

    - name: Install CMake 3.25.1
      run: |
        wget -qO- "https://github.com/Kitware/CMake/releases/download/v3.25.1/cmake-3.25.1-linux-x86_64.tar.gz" | sudo tar --strip-components=1 -xz -C /usr/local
        cmake --version
        echo "/usr/local/bin" >> $GITHUB_PATH

    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
