name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android SDK and NDK manually
      run: |
        # Install sdkmanager
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip -d /tmp
        mkdir -p /usr/local/lib/android/sdk/cmdline-tools
        mv /tmp/cmdline-tools /usr/local/lib/android/sdk/cmdline-tools/latest
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

        # Accept licenses
        yes | sdkmanager --licenses

        # Install platforms, build-tools, ndk
        sdkmanager "platform-tools" "platforms;android-26" "build-tools;33.0.2" "ndk;26.1.10909125"

        # Set environment variables for later steps
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
        echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

    # Replaces the old vcpkg steps: glm/spdlog/nlohmann-json are header-only,
    # so plain apt packages are enough. CMakeLists.txt now passes
    # NO_CMAKE_FIND_ROOT_PATH on their find_path() calls, so CMake will see
    # these even while cross-compiling for Android via the NDK toolchain.
    - name: Install C++ header dependencies (glm, spdlog, nlohmann-json)
      run: |
        sudo apt-get update
        sudo apt-get install -y libglm-dev libspdlog-dev nlohmann-json3-dev

    - name: Install CMake 3.25.1
      run: |
        wget -qO- "https://github.com/Kitware/CMake/releases/download/v3.25.1/cmake-3.25.1-linux-x86_64.tar.gz" | sudo tar --strip-components=1 -xz -C /usr/local
        cmake --version
        echo "/usr/local/bin" >> $GITHUB_PATH

    - name: Build with Gradle
      env:
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        ANDROID_NDK: /usr/local/lib/android/sdk/ndk/26.1.10909125
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
