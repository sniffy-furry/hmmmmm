name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install dependencies (glm, spdlog, etc.)
      run: |
        sudo apt-get update
        sudo apt-get install -y libglm-dev libspdlog-dev

    - name: Prepare cppdeps directory and Find modules
      run: |
        mkdir -p /home/runner/cppdeps/cmake/Modules

        # FindGLM.cmake
        cat > /home/runner/cppdeps/cmake/Modules/FindGLM.cmake <<EOF
        find_path(GLM_INCLUDE_DIR NAMES glm/glm.hpp PATHS /usr/include /usr/local/include)
        mark_as_advanced(GLM_INCLUDE_DIR)
        include(FindPackageHandleStandardArgs)
        find_package_handle_standard_args(GLM DEFAULT_MSG GLM_INCLUDE_DIR)
        if(GLM_FOUND)
            set(GLM_INCLUDE_DIRS \${GLM_INCLUDE_DIR})
        endif()
        EOF

        # Findspdlog.cmake
        cat > /home/runner/cppdeps/cmake/Modules/Findspdlog.cmake <<EOF
        find_path(spdlog_INCLUDE_DIR NAMES spdlog/spdlog.h PATHS /usr/include /usr/local/include)
        mark_as_advanced(spdlog_INCLUDE_DIR)
        include(FindPackageHandleStandardArgs)
        find_package_handle_standard_args(spdlog DEFAULT_MSG spdlog_INCLUDE_DIR)
        if(spdlog_FOUND)
            set(spdlog_INCLUDE_DIRS \${spdlog_INCLUDE_DIR})
        endif()
        EOF

        # Verifică
        ls -la /home/runner/cppdeps/cmake/Modules/

    - name: Install CMake 3.25.1
      run: |
        wget -qO- "https://github.com/Kitware/CMake/releases/download/v3.25.1/cmake-3.25.1-linux-x86_64.tar.gz" | sudo tar --strip-components=1 -xz -C /usr/local
        cmake --version
        echo "/usr/local/bin" >> $GITHUB_PATH

    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
